<svg width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient pour le fond -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Gradient pour le texte -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond avec coins arrondis -->
  <rect x="10" y="10" width="480" height="230" rx="20" ry="20" 
        fill="url(#bgGradient)" 
        stroke="#1e3a8a" 
        stroke-width="2" 
        filter="url(#shadow)"/>
  
  <!-- Icône bouclier (symbole d'assurance) -->
  <g transform="translate(40, 60)">
    <path d="M30 10 L50 20 L50 50 C50 65 40 75 30 80 C20 75 10 65 10 50 L10 20 Z" 
          fill="#fbbf24" 
          stroke="#f59e0b" 
          stroke-width="2"/>
    <circle cx="30" cy="45" r="8" fill="#ffffff"/>
    <path d="M26 45 L29 48 L34 42" stroke="#1e40af" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Texte principal "LES ASSUREURS" -->
  <text x="100" y="100" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        fill="url(#textGradient)" 
        letter-spacing="2px">LES ASSUREURS</text>
  
  <!-- Texte secondaire "EXPERTS" -->
  <text x="100" y="140" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="#fbbf24" 
        letter-spacing="3px">EXPERTS</text>
  
  <!-- Ligne de séparation -->
  <line x1="100" y1="155" x2="400" y2="155" 
        stroke="#fbbf24" 
        stroke-width="3" 
        stroke-linecap="round"/>
  
  <!-- Slogan -->
  <text x="100" y="180" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#e2e8f0" 
        letter-spacing="1px">VOTRE PARTENAIRE ASSURANCE</text>
  
  <!-- Éléments décoratifs -->
  <circle cx="420" cy="70" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="440" cy="85" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="460" cy="100" r="2" fill="#fbbf24" opacity="0.7"/>
  
  <!-- Bordure intérieure subtile -->
  <rect x="15" y="15" width="470" height="220" rx="15" ry="15" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="1" 
        opacity="0.3"/>
</svg>